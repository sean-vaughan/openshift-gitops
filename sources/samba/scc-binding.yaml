# Samba needs to run as root (UID 0) to bind hostPort 445 (<1024).
# Privileged SCC is appropriate here — this is a controlled, single-node lab workload.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: samba-privileged
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: samba
    namespace: samba
