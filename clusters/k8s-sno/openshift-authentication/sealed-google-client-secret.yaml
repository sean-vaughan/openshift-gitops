# Sealed against k8s-sno's sealed-secrets key. To rotate, update
# clusters/k8s-sno/openshift-authentication/google-client-secret.yaml and re-run kubeseal.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: google-oauth-client-secret
  namespace: openshift-config
spec:
  encryptedData:
    clientSecret: 
  template:
    metadata:
      name: google-oauth-client-secret
      namespace: openshift-config
    type: Opaque
