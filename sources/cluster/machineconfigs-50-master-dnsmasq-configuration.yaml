apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: master
  name: "50-master-dnsmasq-configuration"
spec:
  config:
    ignition:
      version: "3.1.0"
    storage:
      files: [{"contents": {"source": "data:text/plain;charset=utf-8;base64,"}, "mode": 365, "overwrite": true, "path": "/usr/local/bin/dnsmasq_config.sh"}, {"contents": {"source": "data:text/plain;charset=utf-8;base64,"}, "mode": 365, "overwrite": true, "path": "/etc/NetworkManager/dispatcher.d/forcedns"}, {"contents": {"source": "data:text/plain;charset=utf-8;base64,ClttYWluXQpyYy1tYW5hZ2VyPXVubWFuYWdlZAo="}, "mode": 420, "overwrite": true, "path": "/etc/NetworkManager/conf.d/single-node.conf"}]
    systemd:
      units: [{"contents": "[Unit]\nDescription=Run dnsmasq to provide local dns for Single Node OpenShift\nBefore=kubelet.service crio.service\nAfter=network.target ovs-configuration.service\n\n[Service]\nTimeoutStartSec=30\nExecStartPre=/usr/local/bin/dnsmasq_config.sh\nExecStart=/usr/sbin/dnsmasq -k\nRestart=always\n\n[Install]\nWantedBy=multi-user.target\n", "enabled": true, "name": "dnsmasq.service"}]
