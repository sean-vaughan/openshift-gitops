# app-of-apps self-management gate file.
#
# Points the generated Application's source at the cluster-local Kustomize
# overlay (clusters/k8s-sno/app-of-apps/), which renders the ApplicationSet
# with the correct cluster list and cluster secret for this cluster.
#
# prune: false / selfHeal: false — Argo CD must not automatically delete or
# revert the ApplicationSet that manages it. See ADR-0005.
spec:
  source:
    path: clusters/k8s-sno/app-of-apps
    # CUTOVER: pin to feature branch while validating migration.
    # Remove this line (and the git generator patch in app-of-apps/kustomization.yaml)
    # before merging to main.
    targetRevision: feature/gitops-flywheel
  syncPolicy:
    preserveResourcesOnDeletion: "true"
    automated:
      prune: false
      selfHeal: false
