# Let's Encrypt staging — untrusted chain, but generous rate limits.
# Use for testing issuance plumbing before pointing a Certificate at
# letsencrypt-prod. Same solver order as prod: DNS-01 via Route 53 for
# vaughan.cc names, HTTP-01 fallback for anything else.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  annotations:
    # ClusterIssuer CRD does not exist on a fresh cluster until the
    # operator in this same source has installed.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: sean@vaughan.cc
    privateKeySecretRef:
      name: acme-private-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
            hostedZoneID: Z1Q0M4HUG3NMMI
            accessKeyIDSecretRef:
              name: route53-credentials
              key: accessKeyID
            secretAccessKeySecretRef:
              name: route53-credentials
              key: secretAccessKey
        selector:
          dnsZones:
            - vaughan.cc
      - http01:
          ingress:
            ingressClassName: openshift-default
