# Public host. TLS terminates at the router with the Let's Encrypt
# certificate issued by certificate.yaml (cut over 2026-06-12; apex A
# record in Route53 — see README about the DDNS caveat). cert-manager
# renews the secret; the router picks up renewals via externalCertificate.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mountainheart-net
  namespace: mountainheart-net
  labels:
    app: httpd
spec:
  host: mountainheart.net
  to:
    kind: Service
    name: httpd
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
