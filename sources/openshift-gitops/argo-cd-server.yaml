apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: argo-cd
  namespace: openshift-gitops
spec:
  kustomizeBuildOptions: '--enable-helm=true --load-restrictor=LoadRestrictionsNone'
  extraConfig:
    exec.enabled: "true"
  server:
    autoscale:
      enabled: false
    grpc:
      ingress:
        enabled: false
    ingress:
      enabled: false
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 125m
        memory: 128Mi
    route:
      enabled: true
    service:
      type: ''
  grafana:
    enabled: false
    ingress:
      enabled: false
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 250m
        memory: 128Mi
    route:
      enabled: false
  monitoring:
    enabled: false
  notifications:
    enabled: false
  prometheus:
    enabled: false
    ingress:
      enabled: false
    route:
      enabled: false
  initialSSHKnownHosts: {}
  sso:
    dex:
      openShiftOAuth: true
      resources:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 250m
          memory: 128Mi
    provider: dex
  applicationSet:
    extraCommandArgs:
      - '--enable-new-git-file-globbing'
    resources:
      limits:
        cpu: '2'
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
    webhookServer:
      ingress:
        enabled: false
      route:
        enabled: false
  rbac:
    defaultPolicy: ''
    policy: |
      g, system:cluster-admins, role:admin
      g, cluster-admins, role:admin
      g, platform-admins, role:admin
      p, role:admin, exec, create, */*, allow
    scopes: '[groups]'
  repo:
    resources:
      limits:
        cpu: '1'
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 256Mi
  resourceExclusions: |
    - apiGroups:
      - tekton.dev
      clusters:
      - '*'
      kinds:
      - TaskRun
      - PipelineRun
    # clusterview.open-cluster-management.io is an aggregated API served by MCE's
    # ocm-proxyserver (multicluster-engine/ocm-proxyserver). It exposes read-only
    # projected cluster views that are never deployed from this repo. Excluding it
    # prevents Argo from tracking or pruning those resources.
    #
    # NOTE: resource.exclusions does NOT prevent Argo from loading the aggregated
    # /openapi/v2 schema — that global fetch happens before any exclusion filtering.
    # MCE 2.11's cluster-lifecycle-api has a schema generation bug: the UserPermission
    # .status $ref uses JSON Pointer ~1-encoded slashes (go package path with ~1 for /)
    # but the definitions map keys use literal slashes. Argo CD v3's kube-openapi
    # does exact-string ref lookup without ~1 unescaping → SchemaError on parse →
    # entire cluster cache fails to initialize → all 17 apps go to sync Unknown.
    # Workaround: MCE's server-foundation component is disabled in the MCE CR
    # (oc patch multiclusterengine multiclusterengine) until a fixed MCE release is
    # available. This exclusion is kept as defence-in-depth so if server-foundation
    # is ever accidentally re-enabled the clusterview resources won't be tracked.
    - apiGroups:
      - clusterview.open-cluster-management.io
      clusters:
      - '*'
      kinds:
      - '*'
  ha:
    enabled: false
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 250m
        memory: 128Mi
  tls:
    ca: {}
  redis:
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 250m
        memory: 128Mi
  controller:
    processors: {}
    resources:
      limits:
        cpu: '2'
        memory: 2Gi
      requests:
        cpu: 250m
        memory: 1Gi
    sharding: {}
