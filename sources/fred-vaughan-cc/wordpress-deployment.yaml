apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: fred-vaughan-cc
  labels:
    app: wordpress
    owner: platform
  annotations:
    email: sean@vaughan.cc
spec:
  replicas: 1
  # Recreate: wordpress-html is RWO; a rolling update would deadlock on the volume.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      restartPolicy: Always
      serviceAccountName: wordpress
      containers:
        - name: wordpress
          # Pinned to the same WordPress core version (7.0) that was running
          # on cloud.vaughan.cc, on a supported PHP (the Fedora 34 host was
          # stuck on EOL PHP 7.4).
          image: wordpress:7.0-php8.3-apache
          ports:
            - containerPort: 80
              name: http
          env:
            - name: WORDPRESS_DB_HOST
              value: mariadb
            - name: WORDPRESS_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: fred-db
                  key: MYSQL_DATABASE
            - name: WORDPRESS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: fred-db
                  key: MYSQL_USER
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fred-db
                  key: MYSQL_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /wp-includes/images/blank.gif
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /wp-includes/images/blank.gif
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: html
              mountPath: /var/www/html
      volumes:
        - name: html
          persistentVolumeClaim:
            claimName: wordpress-html
