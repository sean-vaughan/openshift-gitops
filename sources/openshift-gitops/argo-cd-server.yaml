apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: argo-cd
  namespace: openshift-gitops
spec:
  kustomizeBuildOptions: '--enable-helm=true --load-restrictor=LoadRestrictionsNone'
  extraConfig:
    exec.enabled: "true"
  server:
    autoscale:
      enabled: false
    grpc:
      ingress:
        enabled: false
    ingress:
      enabled: false
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 125m
        memory: 128Mi
    route:
      enabled: true
    service:
      type: ''
  grafana:
    enabled: false
    ingress:
      enabled: false
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 250m
        memory: 128Mi
    route:
      enabled: false
  monitoring:
    enabled: false
  notifications:
    enabled: false
  prometheus:
    enabled: false
    ingress:
      enabled: false
    route:
      enabled: false
  initialSSHKnownHosts: {}
  sso:
    dex:
      openShiftOAuth: true
      resources:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 250m
          memory: 128Mi
    provider: dex
  applicationSet:
    extraCommandArgs:
      - '--enable-new-git-file-globbing'
    resources:
      limits:
        cpu: '2'
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
    webhookServer:
      ingress:
        enabled: false
      route:
        enabled: false
  rbac:
    defaultPolicy: ''
    policy: |
      g, system:cluster-admins, role:admin
      g, cluster-admins, role:admin
      g, platform-admins, role:admin
      p, role:admin, exec, create, */*, allow
    scopes: '[groups]'
  repo:
    resources:
      limits:
        cpu: '1'
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 256Mi
  resourceExclusions: |
    - apiGroups:
      - tekton.dev
      clusters:
      - '*'
      kinds:
      - TaskRun
      - PipelineRun
    # clusterview.open-cluster-management.io is an aggregated API served by MCE's
    # ocm-proxyserver, exposing read-only projected views (never deployed from this
    # repo). Its OpenAPI schema intermittently drops the UserPermissionStatus model
    # referenced by UserPermission.status; when that happens Argo's cluster cache
    # can't build against the broken schema, comparison fails, and every app goes to
    # sync Unknown. Excluding the group keeps the proxy API out of the cache entirely.
    - apiGroups:
      - clusterview.open-cluster-management.io
      clusters:
      - '*'
      kinds:
      - '*'
  ha:
    enabled: false
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 250m
        memory: 128Mi
  tls:
    ca: {}
  redis:
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 250m
        memory: 128Mi
  controller:
    processors: {}
    resources:
      limits:
        cpu: '2'
        memory: 2Gi
      requests:
        cpu: 250m
        memory: 1Gi
    sharding: {}
