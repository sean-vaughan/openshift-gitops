# The Route references the cert-manager-issued secret via
# spec.tls.externalCertificate, which requires the ingress router's service
# account to be able to read (and watch for renewals) that one secret.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: router-read-fred-vaughan-cc-tls
  namespace: fred-vaughan-cc
rules:
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [fred-vaughan-cc-tls]
    verbs: [get, list, watch]
