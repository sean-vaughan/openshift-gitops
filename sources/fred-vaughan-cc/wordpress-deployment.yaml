apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: fred-vaughan-cc
  labels:
    app: wordpress
    owner: platform
  annotations:
    email: sean@vaughan.cc
spec:
  replicas: 1
  # Recreate: wordpress-html is RWO; a rolling update would deadlock on the volume.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      restartPolicy: Always
      serviceAccountName: wordpress
      containers:
        - name: wordpress
          # Pinned to the same WordPress core version (7.0) that was running
          # on cloud.vaughan.cc, on a supported PHP (the Fedora 34 host was
          # stuck on EOL PHP 7.4).
          image: wordpress:7.0-php8.3-apache
          ports:
            - containerPort: 80
              name: http
          env:
            - name: WORDPRESS_DB_HOST
              value: mariadb
            - name: WORDPRESS_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: fred-db
                  key: MYSQL_DATABASE
            - name: WORDPRESS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: fred-db
                  key: MYSQL_USER
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fred-db
                  key: MYSQL_PASSWORD
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fred-smtp
                  key: password
            # WP Mail SMTP is configured entirely via constants (shown as
            # locked "defined in wp-config.php" values in wp-admin) so the
            # mail path lives in git, not in the wp_options table. Outbound
            # mail relays through Gmail as sean@vaughan.cc; Gmail rewrites
            # the From header to the authenticated account regardless.
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                define('WPMS_ON', true);
                define('WPMS_MAILER', 'smtp');
                define('WPMS_SMTP_HOST', 'smtp.gmail.com');
                define('WPMS_SMTP_PORT', 587);
                define('WPMS_SSL', 'tls');
                define('WPMS_SMTP_AUTH', true);
                define('WPMS_SMTP_USER', 'sean@vaughan.cc');
                define('WPMS_SMTP_PASS', getenv('SMTP_PASSWORD'));
                define('WPMS_MAIL_FROM', 'sean@vaughan.cc');
                define('WPMS_MAIL_FROM_FORCE', true);
                define('WPMS_MAIL_FROM_NAME', 'R. Fred Vaughan');
                define('WPMS_MAIL_FROM_NAME_FORCE', true);
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /wp-includes/images/blank.gif
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /wp-includes/images/blank.gif
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: html
              mountPath: /var/www/html
      volumes:
        - name: html
          persistentVolumeClaim:
            claimName: wordpress-html
