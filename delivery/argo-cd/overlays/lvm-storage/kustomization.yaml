apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pull in the delivery-agnostic application manifests from sources/.
resources:
- ../../../../sources/lvm-storage

# Layer on the Argo CD-specific PreSync CSV cleanup hook.
components:
- ../../components/olm-csv-cleanup

# The hook RBAC resources must land in the operator's namespace so the Job
# can list and delete CSVs there.  Kustomize sets metadata.namespace on all
# namespaced resources that don't already have one.
namespace: openshift-storage
