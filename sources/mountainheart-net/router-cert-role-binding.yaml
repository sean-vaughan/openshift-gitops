apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: router-read-mountainheart-net-tls
  namespace: mountainheart-net
  annotations:
    ignore-check.kube-linter.io/access-to-secrets: >-
      spec.tls.externalCertificate requires the router service account to
      read exactly this secret; the Role is scoped by resourceName.
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: router-read-mountainheart-net-tls
subjects:
  - kind: ServiceAccount
    name: router
    namespace: openshift-ingress
