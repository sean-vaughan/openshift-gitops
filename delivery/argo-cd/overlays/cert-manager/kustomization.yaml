apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pull in the delivery-agnostic application manifests from sources/.
resources:
  - ../../../../sources/cert-manager

# Layer on the Argo CD-specific PreSync CSV cleanup hook.
components:
  - ../../components/olm-csv-cleanup

patches:
  # The hook resources must land in the operator's namespace so the Job can
  # list and delete CSVs there.  The usual `namespace:` transformer would
  # also stamp metadata.namespace onto the cluster-scoped ClusterIssuers
  # (kustomize cannot know a CRD's scope), so the namespace is set
  # explicitly on each namespaced hook resource instead.
  - target:
      name: olm-csv-cleanup
    patch: |-
      - op: add
        path: /metadata/namespace
        value: cert-manager-operator
  - target:
      kind: RoleBinding
      name: olm-csv-cleanup
    patch: |-
      - op: add
        path: /subjects/0/namespace
        value: cert-manager-operator
  # On a fresh cluster the ClusterIssuer CRD does not exist until OLM has
  # installed the operator. Skip the dry-run so the first sync can proceed;
  # the sync retry applies the issuers once the CRD is registered.
  - target:
      kind: ClusterIssuer
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
