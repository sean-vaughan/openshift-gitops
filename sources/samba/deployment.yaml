apiVersion: apps/v1
kind: Deployment
metadata:
  name: samba
  namespace: samba
spec:
  replicas: 1
  selector:
    matchLabels:
      app: samba
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: samba
    spec:
      serviceAccountName: samba
      # OVN-Kubernetes (OpenShift's default CNI) does not implement hostPort
      # port-mapping, so hostNetwork is required to bind 445 on the node
      # directly. This is fine for a single-node lab cluster.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        # The servercontainers/samba image attempts chown via a dot-notation
        # user.group syntax that fails silently, leaving /shares/timemachine
        # owned by root and inaccessible to the samba user (UID 1000).
        # This initContainer fixes ownership before smbd starts.
        - name: fix-perms
          image: busybox:latest
          securityContext:
            privileged: true
          command: ["sh", "-c", "chown -R 1000:1000 /shares/timemachine && chmod 700 /shares/timemachine"]
          volumeMounts:
            - name: timemachine-data
              mountPath: /shares/timemachine
      containers:
        - name: samba
          image: ghcr.io/servercontainers/samba:latest
          securityContext:
            privileged: true
          ports:
            - containerPort: 445
              protocol: TCP
          env:
            # Advertise as a TimeCapsule so macOS Time Machine recognises the share
            - name: MODEL
              value: TimeCapsule
            # Disable Avahi/mDNS — mDNS doesn't cross the k8s network boundary;
            # the Mac connects by node IP directly.
            - name: AVAHI_DISABLE
              value: "1"
            - name: WSDD2_DISABLE
              value: "1"
            - name: ACCOUNT_timemachine
              valueFrom:
                secretKeyRef:
                  name: samba-credentials
                  key: password
            - name: UID_timemachine
              value: "1000"
            # Share config: semicolons are treated as line separators by this image.
            # fruit:time machine max size matches the PVC size so Time Machine
            # reports accurate remaining-space figures to macOS.
            - name: SAMBA_VOLUME_CONFIG_timemachine
              value: >-
                [timemachine];
                path = /shares/timemachine;
                valid users = timemachine;
                browseable = yes;
                writable = yes;
                vfs objects = catia fruit streams_xattr;
                fruit:time machine = yes;
                fruit:time machine max size = 1T;
                durable handles = yes;
                kernel oplocks = no;
                kernel share modes = no;
                posix locking = no
          volumeMounts:
            - name: timemachine-data
              mountPath: /shares/timemachine
      volumes:
        - name: timemachine-data
          persistentVolumeClaim:
            claimName: samba-timemachine
