apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  annotations:
    ignore-check.kube-linter.io/access-to-secrets: "spec.tls.externalCertificate requires the router SA to read exactly this secret; the Role is scoped by resourceName.\n"
  name: router-read-frame-tls
  namespace: salience-frame
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: router-read-frame-tls
subjects: [{"kind": "ServiceAccount", "name": "router", "namespace": "openshift-ingress"}]
