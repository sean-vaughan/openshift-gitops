# Let's Encrypt staging — untrusted chain, but generous rate limits.
# Use for testing issuance plumbing before pointing a Certificate at
# letsencrypt-prod. HTTP-01 only: the hostname must resolve to this
# cluster's ingress and port 80 must be reachable from the internet.
# Wildcard certificates cannot be issued via HTTP-01 (DNS-01 required).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: sean@vaughan.cc
    privateKeySecretRef:
      name: acme-private-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
            hostedZoneID: Z1Q0M4HUG3NMMI
            accessKeyIDSecretRef:
              name: route53-credentials
              key: accessKeyID
            secretAccessKeySecretRef:
              name: route53-credentials
              key: secretAccessKey
        selector:
          dnsZones:
            - vaughan.cc
      - http01:
          ingress:
            ingressClassName: openshift-default
