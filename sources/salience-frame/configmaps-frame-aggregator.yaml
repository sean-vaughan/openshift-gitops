apiVersion: v1
data:
  refresh.py: "#!/usr/bin/env python3\n\"\"\"Salience Engine — Frame data aggregator.\n\nPulls external feeds SERVER-SIDE into same-origin JSON the Frame page reads.\nThis keeps the TV browser free of CORS issues and keeps any keys off the screen.\n\nWrites into OUT_DIR (default ./_out, in-cluster: the data PVC mounted by nginx):\n  - news.json     The Guardian RSS  -> trimmed items with snippet + pubDate\n  - weather.json  WU PWS current + Open-Meteo forecast + moon/sun computed\n  - photos.json   Apple Shared Album signed CDN URLs (if ICLOUD_ALBUM_TOKEN is set)\nAnd SEEDS, only if missing (so the page is never empty on first boot):\n  - health.json       mock until RHACM Observability/Grafana is wired (Phase 3)\n  - photos.json       placeholder until ICLOUD_ALBUM_TOKEN is set\n  - latest-pass.json  placeholder until the salience pass publishes one\n\nStdlib only — no pip install needed. Safe to run from a CronJob.\n\"\"\"\n\nimport json\nimport os\nimport re\nimport sys\nimport time\nimport random\nimport datetime\nimport subprocess\nimport urllib.parse\nimport urllib.request\nimport xml.etree.ElementTree as ET\n\nOUT_DIR = os.environ.get(\"OUT_DIR\", \"_out\")\nLAT = os.environ.get(\"LAT\", \"47.9129\")\nLON = os.environ.get(\"LON\", \"-122.3040\")\nWX_LABEL = os.environ.get(\"WX_LABEL\", \"Mukilteo, WA\")\nHTTP_TIMEOUT = int(os.environ.get(\"HTTP_TIMEOUT\", \"15\"))\nICLOUD_TIMEOUT = int(os.environ.get(\"ICLOUD_TIMEOUT\", \"60\"))  # iCloud sharedstreams CDN can be slow\nICLOUD_ALBUM_TOKEN = os.environ.get(\"ICLOUD_ALBUM_TOKEN\", \"\")\n# 0 (default) = publish the whole album. A positive cap takes a RANDOM sample\n# across the full album (not the newest N) so old photos stay reachable.\nPHOTOS_MAX = int(os.environ.get(\"PHOTOS_MAX\", \"0\"))\n# webasseturls is batched — Apple is unreliable with very large guid lists.\nICLOUD_ASSET_BATCH = int(os.environ.get(\"ICLOUD_ASSET_BATCH\", \"100\"))\n# Signed iCloud CDN URLs live ~3h. When the album is unchanged we still re-resolve\n# them once they fall within this many seconds of expiry, so the Frame never hits\n# a dead URL. Default 1h leaves ~2h of slack on a fresh resolve.\nICLOUD_URL_REFRESH_MARGIN = int(os.environ.get(\"ICLOUD_URL_REFRESH_MARGIN\", \"3600\"))\nWU_API_KEY = os.environ.get(\"WU_API_KEY\", \"\")\nWU_STATION_ID = os.environ.get(\"WU_STATION_ID\", \"\")\n\n# Dexcom CGM (developer.dexcom.com — OAuth2 PKCE with offline_access + egv scopes).\n# Get a refresh token via the Dexcom OAuth2 flow and store it as a secret.\n# DEXCOM_SANDBOX=true routes to sandbox-api.dexcom.com for testing.\nDEXCOM_CLIENT_ID     = os.environ.get(\"DEXCOM_CLIENT_ID\", \"\")\nDEXCOM_CLIENT_SECRET = os.environ.get(\"DEXCOM_CLIENT_SECRET\", \"\")\nDEXCOM_REFRESH_TOKEN = os.environ.get(\"DEXCOM_REFRESH_TOKEN\", \"\")\nDEXCOM_SANDBOX       = os.environ.get(\"DEXCOM_SANDBOX\", \"\").lower() in (\"1\", \"true\", \"yes\")\n\n# Google Fit / Health Connect REST API (requires OAuth2 service credentials).\n# Scopes needed: fitness.activity.read, fitness.heart_rate.read, fitness.sleep.read\n# Obtain a refresh token via the installed-app OAuth2 flow and store it as a secret.\nGOOGLE_FIT_CLIENT_ID     = os.environ.get(\"GOOGLE_FIT_CLIENT_ID\", \"\")\nGOOGLE_FIT_CLIENT_SECRET = os.environ.get(\"GOOGLE_FIT_CLIENT_SECRET\", \"\")\nGOOGLE_FIT_REFRESH_TOKEN = os.environ.get(\"GOOGLE_FIT_REFRESH_TOKEN\", \"\")\n\n# Guardian RSS feeds -> (kicker label, url). Public RSS, no account needed.\nGUARDIAN_FEEDS = [\n    (\"US\",          \"https://www.theguardian.com/us-news/rss\"),\n    (\"World\",       \"https://www.theguardian.com/world/rss\"),\n    (\"Tech\",        \"https://www.theguardian.com/technology/rss\"),\n    (\"Environment\", \"https://www.theguardian.com/environment/rss\"),\n]\nNEWS_MAX = int(os.environ.get(\"NEWS_MAX\", \"8\"))\n\n# WMO weather codes -> (description, emoji icon)\nWMO = {\n    0:  (\"Clear\",          \"☀️\"),\n    1:  (\"Mainly clear\",   \"🌤️\"),\n    2:  (\"Partly cloudy\",  \"⛅\"),\n    3:  (\"Overcast\",       \"☁️\"),\n    45: (\"Fog\",            \"🌫️\"),\n    48: (\"Rime fog\",       \"🌫️\"),\n    51: (\"Light drizzle\",  \"🌦️\"),\n    53: (\"Drizzle\",        \"🌦️\"),\n    55: (\"Heavy drizzle\",  \"🌧️\"),\n    61: (\"Light rain\",     \"🌧️\"),\n    63: (\"Rain\",           \"🌧️\"),\n    65: (\"Heavy rain\",     \"🌧️\"),\n    66: (\"Freezing rain\",  \"🌨️\"),\n    67: (\"Freezing rain\",  \"🌨️\"),\n    71: (\"Light snow\",     \"🌨️\"),\n    73: (\"Snow\",           \"❄️\"),\n    75: (\"Heavy snow\",     \"❄️\"),\n    77: (\"Snow grains\",    \"🌨️\"),\n    80: (\"Showers\",        \"🌦️\"),\n    81: (\"Showers\",        \"🌧️\"),\n    82: (\"Heavy showers\",  \"🌧️\"),\n    85: (\"Snow showers\",   \"🌨️\"),\n    86: (\"Snow showers\",   \"❄️\"),\n    95: (\"Thunderstorm\",   \"⛈️\"),\n    96: (\"Thunderstorm\",   \"⛈️\"),\n    99: (\"Thunderstorm\",   \"⛈️\"),\n}\n\n\ndef now_iso():\n    return datetime.datetime.now(datetime.timezone.utc).strftime(\"%Y-%m-%dT%H:%M:%SZ\")\n\n\ndef fetch(url):\n    req = urllib.request.Request(url, headers={\"User-Agent\": \"salience-frame/1.0\"})\n    with urllib.request.urlopen(req, timeout=HTTP_TIMEOUT) as r:\n        return r.read()\n\n\ndef write_json(name, obj):\n    path = os.path.join(OUT_DIR, name)\n    tmp = path + \".tmp\"\n    with open(tmp, \"w\") as f:\n        json.dump(obj, f, ensure_ascii=False, indent=2)\n    os.replace(tmp, path)  # atomic — nginx never serves a half-written file\n\n\ndef read_json(name):\n    \"\"\"Read a previously-written feed file, or None if absent/unreadable.\"\"\"\n    try:\n        with open(os.path.join(OUT_DIR, name)) as f:\n            return json.load(f)\n    except Exception:\n        return None\n    print(\"wrote\", path)\n\n\n# ── News ──────────────────────────────────────────────────────────────────────\n\ndef _strip_html(s):\n    return re.sub(r\"<[^>]+>\", \"\", s).strip()\n\n\ndef refresh_news():\n    items = []\n    per_feed = max(1, NEWS_MAX // len(GUARDIAN_FEEDS))\n    for kicker, url in GUARDIAN_FEEDS:\n        try:\n            root = ET.fromstring(fetch(url))\n        except Exception as e:\n            print(\"news feed failed:\", url, e, file=sys.stderr)\n            continue\n        count = 0\n        for it in root.iter(\"item\"):\n            title = (it.findtext(\"title\") or \"\").strip()\n            if not title:\n                continue\n            desc = _strip_html(it.findtext(\"description\") or \"\")[:220]\n            pub = (it.findtext(\"pubDate\") or \"\").strip()\n            link = (it.findtext(\"link\") or \"\").strip()\n            items.append({\"kicker\": kicker, \"title\": title, \"snippet\": desc,\n                          \"pubDate\": pub, \"url\": link})\n            count += 1\n            if count >= per_feed:\n                break\n    items = items[:NEWS_MAX]\n    if items:\n        write_json(\"news.json\", {\"updated\": now_iso(), \"source\": \"The Guardian\", \"items\": items})\n    else:\n        print(\"no news items fetched; leaving existing news.json in place\", file=sys.stderr)\n\n\n# ── Weather ───────────────────────────────────────────────────────────────────\n\ndef _hm_to_12h(hm):\n    \"\"\"'17:32' → '5:32pm'\"\"\"\n    try:\n        h, m = int(hm[:2]), int(hm[3:5])\n        return \"%d:%02d%s\" % (h % 12 or 12, m, \"am\" if h < 12 else \"pm\")\n    except Exception:\n        return hm\n\n\ndef _wind_dir(deg):\n    dirs = [\"N\",\"NNE\",\"NE\",\"ENE\",\"E\",\"ESE\",\"SE\",\"SSE\",\"S\",\"SSW\",\"SW\",\"WSW\",\"W\",\"WNW\",\"NW\",\"NNW\"]\n    return dirs[round(deg / 22.5) % 16]\n\n\ndef _moon_phase(date):\n    \"\"\"Return (fraction 0-1, name, emoji). 0=new, 0.5=full.\"\"\"\n    known_new = datetime.date(2000, 1, 6)\n    synodic = 29.530588\n    frac = ((date - known_new).days % synodic) / synodic\n    if   frac < 0.033: name, emoji = \"New Moon\",        \"🌑\"\n    elif frac < 0.216: name, emoji = \"Waxing Crescent\", \"🌒\"\n    elif frac < 0.283: name, emoji = \"First Quarter\",   \"🌓\"\n    elif frac < 0.466: name, emoji = \"Waxing Gibbous\",  \"🌔\"\n    elif frac < 0.533: name, emoji = \"Full Moon\",        \"🌕\"\n    elif frac < 0.716: name, emoji = \"Waning Gibbous\",  \"🌖\"\n    elif frac < 0.783: name, emoji = \"Last Quarter\",    \"🌗\"\n    elif frac < 0.966: name, emoji = \"Waning Crescent\", \"🌘\"\n    else:              name, emoji = \"New Moon\",        \"🌑\"\n    return round(frac, 3), name, emoji\n\n\ndef refresh_weather():\n    if not LAT or not LON:\n        print(\"LAT/LON not set; skipping weather\", file=sys.stderr)\n        return\n\n    now_utc = datetime.datetime.now(datetime.timezone.utc)\n    today = now_utc.date()\n    moon_frac, moon_name, moon_emoji = _moon_phase(today)\n\n    # ── Open-Meteo: forecast (5 days) + sunrise/sunset ──\n    om_url = (\n        \"https://api.open-meteo.com/v1/forecast\"\n        \"?latitude=%s&longitude=%s\"\n        \"&current=temperature_2m,weather_code\"\n        \"&daily=weather_code,temperature_2m_max,temperature_2m_min\"\n        \",precipitation_probability_max,sunrise,sunset\"\n        \"&temperature_unit=fahrenheit&timezone=auto&forecast_days=5\"\n    ) % (LAT, LON)\n    try:\n        om = json.loads(fetch(om_url))\n    except Exception as e:\n        print(\"Open-Meteo fetch failed:\", e, file=sys.stderr)\n        om = {}\n\n    om_cur = om.get(\"current\", {})\n    om_code = om_cur.get(\"weather_code\")\n    wmo_desc, wmo_icon = WMO.get(om_code, (\"\", \"\"))\n\n    dr = om.get(\"daily\", {})\n    times      = dr.get(\"time\", [])\n    codes      = dr.get(\"weather_code\", [])\n    hi_list    = dr.get(\"temperature_2m_max\", [])\n    lo_list    = dr.get(\"temperature_2m_min\", [])\n    precip_pct = dr.get(\"precipitation_probability_max\", [])\n    sunrises   = dr.get(\"sunrise\", [])\n    sunsets    = dr.get(\"sunset\", [])\n\n    daily = []\n    for i, t in enumerate(times[:5]):\n        try:\n            dname = \"Today\" if i == 0 else datetime.date.fromisoformat(t).strftime(\"%a\")\n        except Exception:\n            dname = \"?\"\n        c = codes[i] if i < len(codes) else None\n        d_desc, d_icon = WMO.get(c, (\"\", \"\"))\n        daily.append({\n            \"day\":       dname,\n            \"hiF\":       round(hi_list[i])    if i < len(hi_list)    and hi_list[i]    is not None else None,\n            \"loF\":       round(lo_list[i])    if i < len(lo_list)    and lo_list[i]    is not None else None,\n            \"precipPct\": precip_pct[i]        if i < len(precip_pct) else None,\n            \"icon\":      d_icon,\n            \"desc\":      d_desc,\n        })\n\n    # Sunrise / sunset for today → next upcoming event\n    sr_hm = sunrises[0][11:16] if sunrises else \"\"\n    ss_hm = sunsets[0][11:16]  if sunsets  else \"\"\n    now_hm = datetime.datetime.now().strftime(\"%H:%M\")\n    if sr_hm and now_hm < sr_hm:\n        next_event, next_time = \"Sunrise\", _hm_to_12h(sr_hm)\n    elif ss_hm and now_hm < ss_hm:\n        next_event, next_time = \"Sunset\",  _hm_to_12h(ss_hm)\n    else:\n        # Past today's sunset — show tomorrow's sunrise\n        sr2 = sunrises[1][11:16] if len(sunrises) > 1 else \"\"\n        next_event, next_time = \"Sunrise\", _hm_to_12h(sr2)\n\n    sun = {\n        \"sunrise\":   _hm_to_12h(sr_hm),\n        \"sunset\":    _hm_to_12h(ss_hm),\n        \"nextEvent\": next_event,\n        \"nextTime\":  next_time,\n    }\n\n    # ── WU PWS: hyper-local current conditions ──\n    wu = {}\n    if WU_API_KEY and WU_STATION_ID:\n        wu_url = (\n            \"https://api.weather.com/v2/pws/observations/current\"\n            \"?stationId=%s&format=json&units=e&apiKey=%s\"\n        ) % (WU_STATION_ID, WU_API_KEY)\n        try:\n            obs = json.loads(fetch(wu_url)).get(\"observations\", [{}])[0]\n            imp = obs.get(\"imperial\", {})\n            temp   = imp.get(\"temp\")\n            heat   = imp.get(\"heatIndex\")\n            chill  = imp.get(\"windChill\")\n            if   temp is not None and temp <  50 and chill is not None: feels = chill\n            elif temp is not None and temp >= 80 and heat  is not None: feels = heat\n            else: feels = temp\n            wu = {\n                \"tempF\":        temp,\n                \"feelsLikeF\":   feels,\n                \"windSpeedMph\": imp.get(\"windSpeed\"),\n                \"windDirDeg\":   obs.get(\"winddir\"),\n                \"windDir\":      _wind_dir(obs.get(\"winddir\") or 0),\n                \"humidity\":     obs.get(\"humidity\"),\n            }\n        except Exception as e:\n            print(\"WU fetch failed:\", e, file=sys.stderr)\n\n    # Prefer WU temp (hyper-local); fall back to Open-Meteo\n    cur_temp = wu.get(\"tempF\") if wu else (\n        round(om_cur[\"temperature_2m\"]) if om_cur.get(\"temperature_2m\") is not None else None\n    )\n\n    write_json(\"weather.json\", {\n        \"updated\": now_iso(),\n        \"label\":   WX_LABEL,\n        \"current\": {\n            \"tempF\":        cur_temp,\n            \"feelsLikeF\":   wu.get(\"feelsLikeF\"),\n            \"desc\":         wmo_desc,\n            \"icon\":         wmo_icon,\n            \"windSpeedMph\": wu.get(\"windSpeedMph\"),\n            \"windDir\":      wu.get(\"windDir\"),\n            \"humidity\":     wu.get(\"humidity\"),\n        },\n        \"sun\":  sun,\n        \"moon\": {\"phase\": moon_frac, \"name\": moon_name, \"emoji\": moon_emoji},\n        \"daily\": daily,\n        # Deep-link targets for the Frame's temp + forecast (built from LAT/LON).\n        # Override WX_CURRENT_URL / WX_FORECAST_URL to point elsewhere.\n        \"links\": {\n            \"current\":  os.environ.get(\n                \"WX_CURRENT_URL\",  \"https://weather.com/weather/today/l/%s,%s\" % (LAT, LON)),\n            \"forecast\": os.environ.get(\n                \"WX_FORECAST_URL\", \"https://weather.com/weather/tenday/l/%s,%s\" % (LAT, LON)),\n        },\n    })\n\n\n# ── iCloud photos ─────────────────────────────────────────────────────────────\n\ndef _curl_post(url, payload, timeout=None):\n    \"\"\"POST JSON payload via curl. Apple's sharedstreams rejects Python's TLS fingerprint.\"\"\"\n    result = subprocess.run(\n        [\"curl\", \"-s\", \"--max-time\", str(timeout or HTTP_TIMEOUT),\n         \"-X\", \"POST\",\n         \"-H\", \"Content-Type: application/json\",\n         \"-H\", \"User-Agent: salience-frame/1.0\",\n         \"-d\", payload, url],\n        capture_output=True, text=True,\n    )\n    if result.returncode != 0:\n        raise RuntimeError(\"curl failed: \" + result.stderr.strip())\n    return json.loads(result.stdout)\n\n\ndef _icloud_webstream(token, timeout=None):\n    body = _curl_post(\n        \"https://p01-sharedstreams.icloud.com/%s/sharedstreams/webstream\" % token,\n        '{\"streamCtag\":null}',\n        timeout=timeout,\n    )\n    host = body.get(\"X-Apple-MMe-Host\")\n    if host:\n        body = _curl_post(\n            \"https://%s/%s/sharedstreams/webstream\" % (host, token),\n            '{\"streamCtag\":null}',\n            timeout=timeout,\n        )\n    else:\n        host = \"p01-sharedstreams.icloud.com\"\n    return body, host\n\n\ndef _photos_min_url_ttl(photos):\n    \"\"\"Seconds until the soonest-expiring signed URL dies (0 if none parseable).\n    iCloud CDN URLs carry their expiry epoch in the `e=` query param.\"\"\"\n    now = int(time.time())\n    soonest = None\n    for p in photos:\n        q = urllib.parse.parse_qs(urllib.parse.urlparse(p.get(\"url\", \"\")).query)\n        e = (q.get(\"e\") or [\"\"])[0]\n        if e.isdigit():\n            e = int(e)\n            soonest = e if soonest is None else min(soonest, e)\n    return max(0, soonest - now) if soonest is not None else 0\n\n\ndef refresh_photos():\n    if not ICLOUD_ALBUM_TOKEN:\n        print(\"ICLOUD_ALBUM_TOKEN not set; skipping photo refresh\", file=sys.stderr)\n        return\n    token = ICLOUD_ALBUM_TOKEN\n    try:\n        stream, host = _icloud_webstream(token, ICLOUD_TIMEOUT)\n    except Exception as e:\n        print(\"iCloud webstream fetch failed:\", e, file=sys.stderr)\n        return\n\n    base = \"https://%s/%s/sharedstreams\" % (host, token)\n    photos_raw = stream.get(\"photos\", [])\n    if not photos_raw:\n        print(\"iCloud webstream: no photos in album\", file=sys.stderr)\n        return\n\n    # Drop videos — the Frame slideshow renders into an <img>, which can't play\n    # them, so they'd otherwise be silently-skipped blank slots.\n    photos_raw = [p for p in photos_raw if p.get(\"mediaAssetType\") != \"video\"]\n    if not photos_raw:\n        print(\"iCloud webstream: no still photos in album\", file=sys.stderr)\n        return\n\n    # Conditional refresh. webstream is one cheap call and carries a streamCtag\n    # that changes whenever the album does. The expensive part is resolving every\n    # photo's signed URL (the webasseturls batches). Those URLs live ~3h, so when\n    # the album is unchanged AND the URLs we already published are still well\n    # clear of expiry, skip the resolution entirely and leave photos.json as-is.\n    ctag = stream.get(\"streamCtag\", \"\")\n    prev = read_json(\"photos.json\")\n    if ctag and prev and prev.get(\"stream_ctag\") == ctag:\n        slack = _photos_min_url_ttl(prev.get(\"photos\") or [])\n        if slack > ICLOUD_URL_REFRESH_MARGIN:\n            print(\"photos: album unchanged, URLs valid %d min more; skipping resolve\"\n                  % (slack // 60))\n            return\n\n    # Apple returns the album newest-first. Taking the head would pin the Frame\n    # to the most recent days and hide everything older, so publish the whole\n    # album by default; an optional PHOTOS_MAX takes a RANDOM sample across the\n    # full range instead of slicing off the old ones.\n    if PHOTOS_MAX > 0 and len(photos_raw) > PHOTOS_MAX:\n        photos_raw = random.sample(photos_raw, PHOTOS_MAX)\n\n    guids = [p[\"photoGuid\"] for p in photos_raw if \"photoGuid\" in p]\n\n    # Resolve signed CDN URLs in batches — one giant POST is unreliable.\n    checksum_to_url = {}\n    for i in range(0, len(guids), ICLOUD_ASSET_BATCH):\n        chunk = guids[i:i + ICLOUD_ASSET_BATCH]\n        try:\n            asset_data = _curl_post(base + \"/webasseturls\", json.dumps({\"photoGuids\": chunk}))\n        except Exception as e:\n            print(\"iCloud webasseturls fetch failed (batch %d):\" % (i // ICLOUD_ASSET_BATCH), e, file=sys.stderr)\n            continue\n        for checksum, entry in asset_data.get(\"items\", {}).items():\n            loc  = entry.get(\"url_location\", \"\")\n            path = entry.get(\"url_path\", \"\")\n            if loc and path:\n                checksum_to_url[checksum] = \"https://\" + loc + path\n    if not checksum_to_url:\n        print(\"iCloud webasseturls: no URLs resolved; keeping previous photos.json\", file=sys.stderr)\n        return\n\n    out_photos = []\n    for meta in photos_raw:\n        derivatives = meta.get(\"derivatives\", {})\n        if not derivatives:\n            continue\n        best_key = max(derivatives.keys(), key=lambda k: int(k) if k.isdigit() else 0)\n        deriv    = derivatives[best_key]\n        url      = checksum_to_url.get(deriv.get(\"checksum\", \"\"), \"\")\n        if not url:\n            continue\n        out_photos.append({\n            \"guid\":        meta.get(\"photoGuid\", \"\"),\n            \"url\":         url,\n            \"width\":       deriv.get(\"width\"),\n            \"height\":      deriv.get(\"height\"),\n            \"date\":        meta.get(\"dateCreated\", \"\"),\n            \"caption\":     meta.get(\"caption\", \"\"),\n            \"contributor\": meta.get(\"contributorFullName\", \"\"),\n        })\n\n    write_json(\"photos.json\", {\n        \"updated\":      now_iso(),\n        \"source\":       \"Apple Shared Album\",\n        \"token_prefix\": token[:6] + \"…\",\n        \"stream_ctag\":  ctag,\n        \"count\":        len(out_photos),\n        \"photos\":       out_photos,\n    })\n    print(\"photos: wrote %d items\" % len(out_photos))\n\n\n# ── Health check ───────────────────────────────────────────────────────────────\n\ndef refresh_health():\n    \"\"\"Live health check: k8s /healthz (in-cluster), fred.vaughan.cc, Thanos alerts.\"\"\"\n    import time, ssl\n\n    health = {\n        \"updated\": now_iso(),\n        \"cluster\": {\"status\": \"Unknown\"},\n        \"fred\":    {\"status\": \"Down\", \"latency_ms\": None},\n        # reachable=False until the AlertManager probe actually succeeds, so a\n        # swallowed probe error can never masquerade as a genuinely clean 0c/0w.\n        \"alerts\":  {\"critical\": 0, \"warning\": 0, \"reachable\": False},\n    }\n\n    # ── Cluster: in-pod service-account token hits /healthz ──\n    ca_path  = \"/var/run/secrets/kubernetes.io/serviceaccount/ca.crt\"\n    tok_path = \"/var/run/secrets/kubernetes.io/serviceaccount/token\"\n    try:\n        if os.path.exists(ca_path) and os.path.exists(tok_path):\n            ctx = ssl.create_default_context(cafile=ca_path)\n            req = urllib.request.Request(\"https://kubernetes.default.svc/healthz\")\n            req.add_header(\"Authorization\",\n                           \"Bearer \" + open(tok_path).read().strip())\n            body = urllib.request.urlopen(req, context=ctx, timeout=5).read().decode()\n            health[\"cluster\"][\"status\"] = \"Healthy\" if body.strip() == \"ok\" else \"Degraded\"\n        else:\n            health[\"cluster\"][\"status\"] = \"Healthy\"   # running outside cluster\n    except Exception as exc:\n        health[\"cluster\"][\"status\"] = \"Unknown\"\n        print(\"cluster /healthz failed: %s\" % exc, file=sys.stderr)\n\n    # ── fred.vaughan.cc HTTP latency probe ──\n    try:\n        t0 = time.time()\n        r  = urllib.request.urlopen(\"https://fred.vaughan.cc\", timeout=10)\n        ms = int((time.time() - t0) * 1000)\n        if r.status < 500:\n            health[\"fred\"] = {\"status\": \"Up\", \"latency_ms\": ms}\n    except Exception as exc:\n        print(\"fred.vaughan.cc probe failed: %s\" % exc, file=sys.stderr)\n\n    # ── Firing alerts via the OpenShift Thanos Querier ──\n    # The supported in-cluster read path for platform alerts. Requires the pod's\n    # ServiceAccount to carry the `cluster-monitoring-view` ClusterRole (see\n    # deploy/45-aggregator-rbac.yaml) and a bearer token + the SA CA for TLS.\n    # On any failure we leave reachable=False — an honest \"unknown\", never a fake 0.\n    thanos_url = os.environ.get(\n        \"THANOS_URL\",\n        \"https://thanos-querier.openshift-monitoring.svc:9091/api/v1/alerts\",\n    )\n    try:\n        if not (os.path.exists(ca_path) and os.path.exists(tok_path)):\n            raise RuntimeError(\"no in-cluster SA token; alert read skipped\")\n        # Thanos Querier serves a service-signed cert — verify against the injected\n        # OpenShift service-CA bundle (THANOS_CA), not the kube API CA.\n        thanos_ca = os.environ.get(\"THANOS_CA\", ca_path)\n        ctx = ssl.create_default_context(cafile=thanos_ca)\n        req = urllib.request.Request(thanos_url)\n        req.add_header(\"Authorization\", \"Bearer \" + open(tok_path).read().strip())\n        body = urllib.request.urlopen(req, context=ctx, timeout=8).read().decode()\n        payload = json.loads(body)\n        raw = (payload.get(\"data\") or {}).get(\"alerts\") or []\n\n        items, crit, warn = [], 0, 0\n        for a in raw:\n            if a.get(\"state\") != \"firing\":\n                continue\n            labels = a.get(\"labels\", {}) or {}\n            sev = labels.get(\"severity\")\n            if sev == \"critical\":\n                crit += 1\n            elif sev == \"warning\":\n                warn += 1\n            else:\n                continue  # ignore info/none on the Frame\n            annos = a.get(\"annotations\", {}) or {}\n            items.append({\n                \"severity\": sev,\n                \"name\":     labels.get(\"alertname\") or \"(unnamed)\",\n                \"summary\":  annos.get(\"summary\") or annos.get(\"description\") or \"\",\n                \"ns\":       labels.get(\"namespace\") or \"\",\n            })\n        # critical first, then warning, then by name — stable, scannable order\n        items.sort(key=lambda it: (0 if it[\"severity\"] == \"critical\" else 1, it[\"name\"]))\n        health[\"alerts\"] = {\n            \"critical\": crit, \"warning\": warn, \"reachable\": True, \"items\": items,\n        }\n    except Exception as exc:\n        print(\"thanos alert read unavailable (ok if no RBAC/off-cluster): %s\" % exc,\n              file=sys.stderr)\n\n    write_json(\"health.json\", health)\n    print(\"health: cluster=%s fred=%s alerts=%d crit/%d warn (reachable=%s)\" % (\n        health[\"cluster\"][\"status\"],\n        health[\"fred\"][\"status\"],\n        health[\"alerts\"][\"critical\"],\n        health[\"alerts\"][\"warning\"],\n        health[\"alerts\"][\"reachable\"],\n    ))\n\n\n# ── Bio data (Dexcom CGM + Google Fit / Samsung Health) ───────────────────────\n# Pulls into biodata.json which the synth-wave surface reads every 5 minutes.\n# Each provider is independently gated: if credentials are absent the section\n# is skipped and the previous reading is preserved (or seeded as placeholder).\n\ndef _oauth_refresh(token_url, client_id, client_secret, refresh_token):\n    \"\"\"Exchange a refresh token for a fresh access token. Returns token string or None.\"\"\"\n    body = urllib.parse.urlencode({\n        \"grant_type\":    \"refresh_token\",\n        \"client_id\":     client_id,\n        \"client_secret\": client_secret,\n        \"refresh_token\": refresh_token,\n    }).encode()\n    req = urllib.request.Request(\n        token_url, data=body,\n        headers={\"Content-Type\": \"application/x-www-form-urlencoded\",\n                 \"User-Agent\": \"salience-frame/1.0\"},\n        method=\"POST\",\n    )\n    with urllib.request.urlopen(req, timeout=HTTP_TIMEOUT) as r:\n        return json.loads(r.read()).get(\"access_token\")\n\n\ndef _fetch_authed(url, access_token):\n    req = urllib.request.Request(url, headers={\n        \"Authorization\": \"Bearer \" + access_token,\n        \"User-Agent\": \"salience-frame/1.0\",\n    })\n    with urllib.request.urlopen(req, timeout=HTTP_TIMEOUT) as r:\n        return json.loads(r.read())\n\n\n# ── Dexcom ────────────────────────────────────────────────────────────────────\n\ndef _dexcom_trend_name(trend):\n    \"\"\"Map Dexcom trendRate direction labels to display strings.\"\"\"\n    mapping = {\n        \"DoubleUp\":      \"DoubleUp\",\n        \"SingleUp\":      \"SingleUp\",\n        \"FortyFiveUp\":   \"FortyFiveUp\",\n        \"Flat\":          \"Flat\",\n        \"FortyFiveDown\": \"FortyFiveDown\",\n        \"SingleDown\":    \"SingleDown\",\n        \"DoubleDown\":    \"DoubleDown\",\n        \"None\":          \"NONE\",\n        \"NotComputable\": \"NONE\",\n        \"RateOutOfRange\":\"NONE\",\n    }\n    return mapping.get(trend, \"Flat\")\n\n\ndef refresh_dexcom(biodata):\n    \"\"\"Populate biodata['glucose'] from the Dexcom API v3. Mutates biodata in-place.\"\"\"\n    if not (DEXCOM_CLIENT_ID and DEXCOM_CLIENT_SECRET and DEXCOM_REFRESH_TOKEN):\n        print(\"Dexcom: credentials not set (DEXCOM_CLIENT_ID/SECRET/REFRESH_TOKEN); skipping\",\n              file=sys.stderr)\n        return\n\n    base = \"https://sandbox-api.dexcom.com\" if DEXCOM_SANDBOX else \"https://api.dexcom.com\"\n    try:\n        token = _oauth_refresh(\n            base + \"/v2/oauth2/token\",\n            DEXCOM_CLIENT_ID, DEXCOM_CLIENT_SECRET, DEXCOM_REFRESH_TOKEN,\n        )\n    except Exception as e:\n        print(\"Dexcom: token refresh failed:\", e, file=sys.stderr)\n        return\n\n    # Fetch last 3 hours of EGVs (5-minute intervals = up to 36 readings)\n    now_utc = datetime.datetime.now(datetime.timezone.utc)\n    start   = now_utc - datetime.timedelta(hours=3)\n    fmt     = \"%Y-%m-%dT%H:%M:%S\"\n    egv_url = (\n        \"%s/v3/users/self/egvs?startDate=%s&endDate=%s\"\n        % (base, start.strftime(fmt), now_utc.strftime(fmt))\n    )\n    try:\n        data = _fetch_authed(egv_url, token)\n    except Exception as e:\n        print(\"Dexcom: EGV fetch failed:\", e, file=sys.stderr)\n        return\n\n    records = data.get(\"records\") or []\n    if not records:\n        print(\"Dexcom: no EGV records returned\", file=sys.stderr)\n        return\n\n    # records are newest-first; reverse so sparkline reads left-to-right\n    records = list(reversed(records))\n    readings = []\n    for r in records:\n        v = r.get(\"value\")\n        t = r.get(\"systemTime\") or r.get(\"displayTime\") or \"\"\n        if v is not None:\n            readings.append({\"time\": t, \"mgdl\": v})\n\n    latest = readings[-1] if readings else {}\n    mgdl   = latest.get(\"mgdl\")\n    trend  = _dexcom_trend_name(records[-1].get(\"trend\", \"Flat\") if records else \"Flat\")\n\n    def glucose_status(v):\n        if v is None: return \"UNKNOWN\"\n        if v < 70:   return \"CRITICAL_LOW\"\n        if v < 80:   return \"LOW\"\n        if v <= 140: return \"IN_RANGE\"\n        if v <= 180: return \"HIGH\"\n        return \"VERY_HIGH\"\n\n    biodata[\"glucose\"] = {\n        \"mgdl\":       mgdl,\n        \"mmol\":       round(mgdl / 18.0, 1) if mgdl is not None else None,\n        \"trend\":      trend,\n        \"status\":     glucose_status(mgdl),\n        \"low_alert\":  70,\n        \"high_alert\": 180,\n        \"target_low\":  80,\n        \"target_high\": 140,\n        \"readings\":   readings[-24:],  # keep last 2 hours for the sparkline\n    }\n    print(\"Dexcom: %d EGVs, latest=%s mgdL trend=%s\" % (len(readings), mgdl, trend))\n\n\n# ── Google Fit ────────────────────────────────────────────────────────────────\n\ndef _gfit_nanos(dt):\n    \"\"\"Epoch nanoseconds from a datetime.\"\"\"\n    return int(dt.timestamp() * 1e9)\n\n\ndef _gfit_aggregate(token, data_type, start_ns, end_ns, bucket_ms=86400000):\n    \"\"\"Call the Fitness aggregate API for a single dataType. Returns buckets list.\"\"\"\n    url  = \"https://www.googleapis.com/fitness/v1/users/me/dataset:aggregate\"\n    body = json.dumps({\n        \"aggregateBy\": [{\"dataTypeName\": data_type}],\n        \"bucketByTime\": {\"durationMillis\": bucket_ms},\n        \"startTimeMillis\": start_ns // 1000000,\n        \"endTimeMillis\":   end_ns   // 1000000,\n    }).encode()\n    req = urllib.request.Request(url, data=body, method=\"POST\", headers={\n        \"Authorization\":  \"Bearer \" + token,\n        \"Content-Type\":   \"application/json\",\n        \"User-Agent\":     \"salience-frame/1.0\",\n    })\n    with urllib.request.urlopen(req, timeout=HTTP_TIMEOUT) as r:\n        return json.loads(r.read()).get(\"bucket\", [])\n\n\ndef _gfit_point_val(buckets, field=\"value\", stat=\"intVal\"):\n    \"\"\"Extract the first value from the first point in the first non-empty bucket.\"\"\"\n    for bkt in reversed(buckets):  # most recent first\n        for ds in bkt.get(\"dataset\", []):\n            for pt in ds.get(\"point\", []):\n                for fv in pt.get(\"value\", []):\n                    v = fv.get(stat) or fv.get(\"fpVal\")\n                    if v is not None:\n                        return v\n    return None\n\n\ndef refresh_google_fit(biodata):\n    \"\"\"Populate biodata['activity'], ['heart'], ['sleep'] from the Google Fit REST API.\"\"\"\n    if not (GOOGLE_FIT_CLIENT_ID and GOOGLE_FIT_CLIENT_SECRET and GOOGLE_FIT_REFRESH_TOKEN):\n        print(\"Google Fit: credentials not set; skipping\", file=sys.stderr)\n        return\n\n    try:\n        token = _oauth_refresh(\n            \"https://oauth2.googleapis.com/token\",\n            GOOGLE_FIT_CLIENT_ID, GOOGLE_FIT_CLIENT_SECRET, GOOGLE_FIT_REFRESH_TOKEN,\n        )\n    except Exception as e:\n        print(\"Google Fit: token refresh failed:\", e, file=sys.stderr)\n        return\n\n    now_utc   = datetime.datetime.now(datetime.timezone.utc)\n    day_start = now_utc.replace(hour=0, minute=0, second=0, microsecond=0)\n    end_ns    = _gfit_nanos(now_utc)\n    start_ns  = _gfit_nanos(day_start)\n    # Yesterday start for sleep (sleep windows span midnight)\n    sleep_start_ns = _gfit_nanos(day_start - datetime.timedelta(hours=14))\n\n    errors = []\n\n    def agg(dtype, start=None, bucket_ms=86400000):\n        try:\n            return _gfit_aggregate(token, dtype, start or start_ns, end_ns, bucket_ms)\n        except Exception as e:\n            errors.append(\"%s: %s\" % (dtype, e))\n            return []\n\n    # ── Steps\n    step_bkts = agg(\"com.google.step_count.delta\")\n    steps = None\n    for bkt in reversed(step_bkts):\n        for ds in bkt.get(\"dataset\", []):\n            total = sum(\n                fv.get(\"intVal\", 0)\n                for pt in ds.get(\"point\", [])\n                for fv in pt.get(\"value\", [])\n                if fv.get(\"intVal\") is not None\n            )\n            if total:\n                steps = total\n                break\n        if steps is not None:\n            break\n\n    # ── Calories (active)\n    cal_bkts = agg(\"com.google.calories.expended\")\n    calories = _gfit_point_val(cal_bkts, stat=\"fpVal\")\n    if calories is not None:\n        calories = int(calories)\n\n    # ── Distance (meters → miles)\n    dist_bkts = agg(\"com.google.distance.delta\")\n    dist_m = _gfit_point_val(dist_bkts, stat=\"fpVal\")\n    dist_miles = round(dist_m * 0.000621371, 2) if dist_m else None\n\n    # ── Active minutes\n    active_bkts = agg(\"com.google.active_minutes\")\n    active_min = _gfit_point_val(active_bkts, stat=\"intVal\")\n\n    # ── Heart rate (instantaneous, last reading in today's bucket)\n    hr_bkts = agg(\"com.google.heart_rate.bpm\", bucket_ms=3600000)\n    bpm = None\n    for bkt in reversed(hr_bkts):\n        for ds in bkt.get(\"dataset\", []):\n            pts = ds.get(\"point\", [])\n            if pts:\n                fv_list = pts[-1].get(\"value\", [])\n                if fv_list:\n                    bpm = fv_list[0].get(\"fpVal\")\n                    if bpm:\n                        bpm = int(round(bpm))\n                        break\n        if bpm:\n            break\n\n    # ── Resting heart rate\n    rhr_bkts = agg(\"com.google.heart_rate.summary\")\n    rhr = _gfit_point_val(rhr_bkts, stat=\"fpVal\")\n    if rhr:\n        rhr = int(round(rhr))\n\n    # ── Sleep (spans previous afternoon to now)\n    sleep_out = {\"hours\": None, \"score\": None, \"deep_hours\": None, \"rem_hours\": None, \"light_hours\": None}\n    try:\n        sleep_bkts = _gfit_aggregate(\n            token, \"com.google.sleep.segment\",\n            sleep_start_ns, end_ns, bucket_ms=86400000\n        )\n        deep_s = light_s = rem_s = total_s = 0\n        for bkt in sleep_bkts:\n            for ds in bkt.get(\"dataset\", []):\n                for pt in ds.get(\"point\", []):\n                    seg_type = (pt.get(\"value\") or [{}])[0].get(\"intVal\", 0)\n                    dur_ns   = int(pt.get(\"endTimeNanos\", 0)) - int(pt.get(\"startTimeNanos\", 0))\n                    dur_s    = dur_ns / 1e9\n                    if seg_type == 4:   deep_s  += dur_s   # DEEP\n                    elif seg_type == 5: light_s += dur_s   # LIGHT\n                    elif seg_type == 6: rem_s   += dur_s   # REM\n                    total_s += dur_s\n        if total_s > 0:\n            sleep_out[\"hours\"]       = round(total_s / 3600, 1)\n            sleep_out[\"deep_hours\"]  = round(deep_s  / 3600, 1)\n            sleep_out[\"rem_hours\"]   = round(rem_s   / 3600, 1)\n            sleep_out[\"light_hours\"] = round(light_s / 3600, 1)\n    except Exception as e:\n        errors.append(\"sleep: %s\" % e)\n\n    if errors:\n        print(\"Google Fit warnings:\", \"; \".join(errors), file=sys.stderr)\n\n    biodata[\"activity\"] = {\n        \"steps\":           steps,\n        \"steps_goal\":      10000,\n        \"calories_active\": calories,\n        \"distance_miles\":  dist_miles,\n        \"active_minutes\":  active_min,\n    }\n    biodata[\"heart\"] = {\n        \"bpm_current\": bpm,\n        \"bpm_resting\": rhr,\n    }\n    biodata[\"sleep\"] = sleep_out\n\n    print(\"Google Fit: steps=%s bpm=%s sleep=%sh\" % (steps, bpm, sleep_out.get(\"hours\")))\n\n\ndef refresh_biodata():\n    \"\"\"Aggregate Dexcom CGM + Google Fit into biodata.json for the synth-wave surface.\"\"\"\n    prev = read_json(\"biodata.json\") or {}\n    biodata = {\n        \"updated\": now_iso(),\n        \"source\":  [],\n        # Carry forward previous readings if a provider fails mid-run\n        \"glucose\":  prev.get(\"glucose\",  {}),\n        \"activity\": prev.get(\"activity\", {}),\n        \"heart\":    prev.get(\"heart\",    {}),\n        \"sleep\":    prev.get(\"sleep\",    {}),\n        \"body\":     prev.get(\"body\",     {}),\n    }\n\n    if DEXCOM_REFRESH_TOKEN:\n        refresh_dexcom(biodata)\n        biodata[\"source\"].append(\"dexcom\")\n\n    if GOOGLE_FIT_REFRESH_TOKEN:\n        refresh_google_fit(biodata)\n        biodata[\"source\"].append(\"google_fit\")\n\n    if not biodata[\"source\"]:\n        print(\"biodata: no credentials set; leaving placeholder in place\", file=sys.stderr)\n        return\n\n    biodata[\"source\"] = \"+\".join(biodata[\"source\"])\n    write_json(\"biodata.json\", biodata)\n\n\n# ── Seeds ──────────────────────────────────────────────────────────────────────\n\ndef seed_if_missing(name, obj):\n    path = os.path.join(OUT_DIR, name)\n    if not os.path.exists(path):\n        write_json(name, obj)\n\n\ndef seed_placeholders():\n    seed_if_missing(\"health.json\", {\n        \"updated\":  now_iso(),\n        \"cluster\":  {\"status\": \"Healthy\", \"nodes\": \"1/1\"},\n        \"fred\":     {\"status\": \"Up\", \"latency_ms\": 0},\n        \"alerts\":   {\"critical\": 0, \"warning\": 0, \"reachable\": False},\n        \"_note\":    \"MOCK seed. Replaced by RHACM Observability / Grafana (Phase 3).\",\n    })\n    seed_if_missing(\"photos.json\", {\n        \"updated\": now_iso(),\n        \"source\":  \"placeholder until the Apple Photos Shared Album adapter is wired\",\n        \"photos\":  [],\n    })\n    seed_if_missing(\"latest-pass.json\", {\n        \"updated\": now_iso(), \"quiet\": True, \"items\": [],\n        \"_note\":   \"placeholder until the salience pass publishes a real artifact\",\n    })\n    # Control channel: seed once, never overwrite — operators bump `reload` to\n    # push a reload to every Frame (see scripts/frame-control.sh).\n    seed_if_missing(\"control.json\", {\n        \"updated\": now_iso(), \"reload\": 0,\n        \"_note\":   \"bump `reload` to force every Frame to reload on its next poll\",\n    })\n    seed_if_missing(\"biodata.json\", {\n        \"updated\": now_iso(),\n        \"source\":  \"placeholder — set DEXCOM_REFRESH_TOKEN + GOOGLE_FIT_REFRESH_TOKEN\",\n        \"glucose\":  {\"mgdl\": None, \"trend\": \"Flat\", \"status\": \"UNKNOWN\", \"readings\": [],\n                     \"low_alert\": 70, \"high_alert\": 180, \"target_low\": 80, \"target_high\": 140},\n        \"activity\": {\"steps\": None, \"steps_goal\": 10000},\n        \"heart\":    {\"bpm_current\": None, \"bpm_resting\": None},\n        \"sleep\":    {\"hours\": None, \"score\": None, \"deep_hours\": None, \"rem_hours\": None},\n        \"body\":     {},\n        \"_note\":    \"SEED. Replaced once DEXCOM_REFRESH_TOKEN and/or GOOGLE_FIT_REFRESH_TOKEN are set.\",\n    })\n\n\ndef main():\n    os.makedirs(OUT_DIR, exist_ok=True)\n    seed_placeholders()\n    refresh_news()\n    refresh_weather()\n    refresh_health()\n    refresh_biodata()\n    refresh_photos()\n\n\nif __name__ == \"__main__\":\n    main()\n"
kind: ConfigMap
metadata:
  name: frame-aggregator
  namespace: salience-frame
